name: Build and verify signed image

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.16.8
    steps:
      - name: Checkout application manifest
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake ninja-build gperf ccache dfu-util dtc wget \
            python3-dev python3-pip python3-venv python3-setuptools python3-wheel \
            xz-utils file make libsdl2-dev libmagic1

      - name: Install Zephyr SDK (ARM)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.8/zephyr-sdk-0.16.8_linux-x86_64.tar.xz
          sudo mkdir -p /opt
          sudo tar xf zephyr-sdk-0.16.8_linux-x86_64.tar.xz -C /opt
          yes | sudo ${ZEPHYR_SDK_INSTALL_DIR}/setup.sh -c -t arm-zephyr-eabi

      - name: Install west + imgtool
        run: pip3 install --user west imgtool

      - name: West init / update
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          west init -l .
          west update

      - name: Install Zephyr / nRF Python requirements
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip3 install --user -r zephyr/scripts/requirements.txt
          pip3 install --user -r nrf/scripts/requirements.txt

      - name: Generate ephemeral signing key
        run: |
          mkdir -p app/keys
          openssl ecparam -name prime256v1 -genkey -noout -out app/keys/mcuboot.pem

      - name: Build (sysbuild: app + MCUboot)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          west zephyr-export
          west build --sysbuild -b nrf52840dk/nrf52840 -d build app

      - name: Verify signed application image
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          test -f build/app/zephyr/zephyr.signed.bin
          imgtool verify -k app/keys/mcuboot.pem build/app/zephyr/zephyr.signed.bin

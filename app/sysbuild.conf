# Sysbuild (NCS / Zephyr): MCUboot + application images.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Match application CONFIG_MCUBOOT_BOOTLOADER_MODE_SWAP_SCRATCH.
SB_CONFIG_MCUBOOT_MODE_SWAP_SCRATCH=y

# ECDSA P-256 (private key path is set to an absolute path in sysbuild/CMakeLists.txt).
SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y

# Reserves 8 KiB for CONFIG_BT_SETTINGS (NVS) at the top of internal flash, trading a
# same-sized slice from the MCUboot scratch area (swap still has 112 KiB scratch).
# Without this, CONFIG_SETTINGS_NVS cannot resolve PM_settings_storage_ID.

mcuboot:
  address: 0x0
  region: flash_primary
  size: 0xc000
mcuboot_pad:
  address: 0xc000
  region: flash_primary
  size: 0x200
app:
  address: 0xc200
  region: flash_primary
  size: 0x6ae00
mcuboot_primary:
  address: 0xc000
  region: flash_primary
  size: 0x6b000
  orig_span: &id001
  - mcuboot_pad
  - app
  span: *id001
mcuboot_primary_app:
  address: 0xc200
  region: flash_primary
  size: 0x6ae00
  orig_span: &id002
  - app
  span: *id002
mcuboot_secondary:
  address: 0x77000
  region: flash_primary
  size: 0x6b000
mcuboot_scratch:
  address: 0xe2000
  region: flash_primary
  size: 0x1c000
settings_storage:
  address: 0xfe000
  region: flash_primary
  size: 0x2000

# Logging / UART (nRF DK VCOM console)
CONFIG_LOG=y
# Deferred log can be lost if sys_reboot() runs before the log thread flushes (MCUmgr os reset)
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y

# Long DFU: stream-flash + SMP use deep stacks; too small a workqueue can fault during upload.
CONFIG_MAIN_STACK_SIZE=5120
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

# Flash / image metadata
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# MCUboot application slot integration
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_SWAP_SCRATCH=y

# Sign the application image at link time (same PEM as MCUboot verifies). Key path and
# imgtool --version are set in CMakeLists.txt (see mcuboot_ota_kconf.conf) so paths work
# when the west workspace root is not the app folder.
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=n

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME="Dax_BLE_v1"
CONFIG_BT_MAX_CONN=2
CONFIG_BT_SMP=y
CONFIG_BT_RX_STACK_SIZE=4608

# NVS + settings: restore identity & pairing keys from flash. Without this, phones
# that still store an old bond see encryption fail and disconnect immediately.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
# Development: re-pair if the phone has a bond but the target was reflashed/erased
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# L2CAP / EATT: nRF Connect and many Android centrals use Enhanced ATT + eCRED CoCs.
# Without this, the host can log "unknown channel" for CIDs in 0x0001-0x003f (e.g. 0x003a) and
# interoperability is poor. EATT is experimental in Zephyr but is the main stack-side fix.
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y
CONFIG_BT_L2CAP_ECRED=y
CONFIG_BT_EATT=y
CONFIG_BT_EATT_MAX=3
# n = do not also schedule EATT from peripheral on security change (lets central / iOS open eCRED
#   first; reduces races that show as unknown L2CAP CID 0x003a with some iPads). SMP still on ATT.
CONFIG_BT_EATT_AUTO_CONNECT=n

# Larger ATT MTU helps SMP image transfer throughput
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
# Host TX buffers must match the SoftDevice Controller ACL count (3); mismatch causes
# warnings and has been known to break SMP / L2CAP during long DFU transfers.
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# MCUmgr + SMP over BLE (nRF Connect “DFU” / image upload)
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_BASE64=y

CONFIG_MCUMGR=y
# Serial SMP transport (UART): allows OTA from PC via mcumgr CLI over COM port
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
# n (default) avoids post-connect interval updates that some centrals handle poorly; re-enable
# for max throughput on hardware that tolerates the requested parameters.
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=n
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=8192

CONFIG_MCUMGR_GRP_IMG=y
# Cooperate with app deferred boot_write_img_confirmed(): cancel while slot-1 OTA is active
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_GRP_IMG_STATUS_HOOKS=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
# Log (and optionally gate) warm reset from MCUmgr "os reset" (phones often send this around DFU)
CONFIG_MCUMGR_GRP_OS_RESET_HOOK=y

# Reboot after image swap / reset requests
CONFIG_REBOOT=y

# Entropy (Bluetooth)
CONFIG_ENTROPY_GENERATOR=y

# Decode last reset in firmware (POR, pin, WDT, lockup, soft reset, etc.)
CONFIG_HWINFO=y
